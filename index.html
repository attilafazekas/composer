<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Composer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <span class="app-title">✦ Composer</span>
    <nav class="tabs">
      <button class="tab active" data-tab="neck">Neck</button>
      <button class="tab" data-tab="chord-finder">Chords</button>
      <button class="tab" data-tab="chords">Chord Progression</button>
    </nav>
    <button class="icon-btn" id="settings-btn" title="Settings">⚙</button>
  </header>

  <!-- ── Settings modal ── -->
  <div class="modal-overlay hidden" id="settings-modal">
    <div class="modal">
      <h3>Settings</h3>
      <label>Anthropic API Key
        <input type="password" id="api-key-input" placeholder="sk-ant-..." />
      </label>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="settings-cancel">Cancel</button>
        <button class="btn btn-primary" id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <main>

    <!-- ── Neck tab ── -->
    <section id="tab-neck" class="tab-panel active">
      <div class="neck-controls">
        <div class="control-group">
          <label>Tuning</label>
          <select id="tuning-preset">
            <optgroup label="6-String Standard">
              <option value="standard">Standard — E A D G B E</option>
              <option value="eb-standard">Eb Standard — Eb Ab Db Gb Bb Eb</option>
              <option value="d-standard">D Standard — D G C F A D</option>
              <option value="cs-standard">C# Standard — C# F# B E G# C#</option>
              <option value="c-standard">C Standard — C F Bb Eb G C</option>
              <option value="b-standard">B Standard — B E A D F# B</option>
            </optgroup>
            <optgroup label="6-String Drop">
              <option value="drop-d">Drop D — D A D G B E</option>
              <option value="drop-cs">Drop C# — C# G# C# F# Bb Eb</option>
              <option value="drop-c">Drop C — C G C F A D</option>
              <option value="drop-b" selected>Drop B — B F# B E G# C#</option>
              <option value="drop-as">Drop Bb — Bb F Bb Eb G C</option>
              <option value="drop-a">Drop A — A E A D F# B</option>
            </optgroup>
            <optgroup label="Open / Alternate">
              <option value="open-g">Open G — D G D G B D</option>
              <option value="open-d">Open D — D A D F# A D</option>
              <option value="dadgad">DADGAD — D A D G A D</option>
            </optgroup>
            <optgroup label="7-String">
              <option value="7-standard">7 Standard — B E A D G B E</option>
              <option value="7-drop-a">7 Drop A — A E A D G B E</option>
              <option value="7-bb">7 Bb Standard — Bb Eb Ab Db Gb Bb Eb</option>
              <option value="7-drop-gs">7 Drop Ab — Ab Eb Ab Db Gb Bb Eb</option>
              <option value="7-a-std">7 A Standard — A D G C F A D</option>
              <option value="7-drop-g">7 Drop G — G D G C F A D</option>
              <option value="7-gs-std">7 Ab Standard — Ab Db Gb B E Ab Db</option>
              <option value="7-drop-fs">7 Drop F# — F# Db F# B E Ab Db</option>
              <option value="7-fs-std">7 F# Standard — F# B E A D F# B</option>
              <option value="7-drop-e">7 Drop E — E B E A D F# B</option>
            </optgroup>
            <option value="custom">Custom…</option>
          </select>
        </div>
        <div class="control-group" id="custom-tuning-group" style="display:none">
          <label>Custom (low → high)</label>
          <div class="string-inputs">
            <input class="string-note" placeholder="B" maxlength="2" />
            <input class="string-note" placeholder="F#" maxlength="2" />
            <input class="string-note" placeholder="B" maxlength="2" />
            <input class="string-note" placeholder="E" maxlength="2" />
            <input class="string-note" placeholder="G#" maxlength="2" />
            <input class="string-note" placeholder="C#" maxlength="2" />
          </div>
        </div>
        <div class="control-group">
          <label>Root</label>
          <select id="root-note">
            <option>C</option><option>C#</option><option>D</option>
            <option>D#</option><option>E</option><option>F</option>
            <option>F#</option><option>G</option><option>G#</option>
            <option>A</option><option>A#</option><option value="B" selected>B</option>
          </select>
        </div>
        <div class="control-group">
          <label>Scale / Mode</label>
          <select id="scale-select">
            <option value="none">— none —</option>
            <option value="major">Major</option>
            <option value="minor" selected>Natural Minor</option>
            <option value="pent-major">Pentatonic Major</option>
            <option value="pent-minor">Pentatonic Minor</option>
            <option value="blues">Blues</option>
            <option value="dorian">Dorian</option>
            <option value="phrygian">Phrygian</option>
            <option value="lydian">Lydian</option>
            <option value="mixolydian">Mixolydian</option>
            <option value="harmonic-minor">Harmonic Minor</option>
          </select>
        </div>
      </div>
      <div id="fretboard-wrap">
        <div id="fretboard"></div>
      </div>
      <div id="chord-indicator" class="hidden"></div>
      <div class="neck-legend">
        <span class="dot root-dot"></span> Root &nbsp;
        <span class="dot scale-dot"></span> Scale note &nbsp;
        <span class="dot muted-dot"></span> Out of scale
      </div>
      <div id="neck-chord-strip"></div>
    </section>

    <!-- ── Chord finder tab ── -->
    <section id="tab-chord-finder" class="tab-panel">
      <div class="cf-controls">
        <div class="control-group">
          <label>Root</label>
          <select id="cf-root">
            <option>C</option><option>C#</option><option>D</option>
            <option>D#</option><option>E</option><option>F</option>
            <option>F#</option><option>G</option><option>G#</option>
            <option>A</option><option>A#</option><option value="B" selected>B</option>
          </select>
        </div>
        <div class="control-group">
          <label>Chord Type</label>
          <select id="cf-chord-type">
            <option value="maj">maj</option>
            <option value="min">min</option>
            <option value="5">5</option>
            <option value="sus2">sus2</option>
            <option value="sus4">sus4</option>
            <option value="7">7</option>
            <option value="maj7">maj7</option>
            <option value="m7">m7</option>
            <option value="dim">dim</option>
            <option value="aug">aug</option>
            <option value="m7b5">m7b5</option>
            <option value="add9">add9</option>
            <option value="9">9</option>
            <option value="maj9">maj9</option>
            <option value="m9">m9</option>
          </select>
        </div>
        <div class="control-group">
          <label>Tuning</label>
          <select id="cf-tuning">
            <optgroup label="6-String Standard">
              <option value="standard">Standard — E A D G B E</option>
              <option value="eb-standard">Eb Standard — Eb Ab Db Gb Bb Eb</option>
              <option value="d-standard">D Standard — D G C F A D</option>
              <option value="cs-standard">C# Standard — C# F# B E G# C#</option>
              <option value="c-standard">C Standard — C F Bb Eb G C</option>
              <option value="b-standard">B Standard — B E A D F# B</option>
            </optgroup>
            <optgroup label="6-String Drop">
              <option value="drop-d">Drop D — D A D G B E</option>
              <option value="drop-cs">Drop C# — C# G# C# F# Bb Eb</option>
              <option value="drop-c">Drop C — C G C F A D</option>
              <option value="drop-b" selected>Drop B — B F# B E G# C#</option>
              <option value="drop-as">Drop Bb — Bb F Bb Eb G C</option>
              <option value="drop-a">Drop A — A E A D F# B</option>
            </optgroup>
            <optgroup label="Open / Alternate">
              <option value="open-g">Open G — D G D G B D</option>
              <option value="open-d">Open D — D A D F# A D</option>
              <option value="dadgad">DADGAD — D A D G A D</option>
            </optgroup>
            <optgroup label="7-String">
              <option value="7-standard">7 Standard — B E A D G B E</option>
              <option value="7-drop-a">7 Drop A — A E A D G B E</option>
              <option value="7-bb">7 Bb Standard — Bb Eb Ab Db Gb Bb Eb</option>
              <option value="7-drop-gs">7 Drop Ab — Ab Eb Ab Db Gb Bb Eb</option>
              <option value="7-a-std">7 A Standard — A D G C F A D</option>
              <option value="7-drop-g">7 Drop G — G D G C F A D</option>
              <option value="7-gs-std">7 Ab Standard — Ab Db Gb B E Ab Db</option>
              <option value="7-drop-fs">7 Drop F# — F# Db F# B E Ab Db</option>
              <option value="7-fs-std">7 F# Standard — F# B E A D F# B</option>
              <option value="7-drop-e">7 Drop E — E B E A D F# B</option>
            </optgroup>
          </select>
        </div>
      </div>
      <div class="cf-cards" id="cf-cards"></div>
      <div id="cf-neck-wrap">
        <div id="cf-neck"></div>
      </div>
      <div class="cf-stepper" id="cf-stepper">
        <button class="btn btn-secondary" id="cf-prev">&#8592;</button>
        <span id="cf-pos-label"></span>
        <button class="btn btn-secondary" id="cf-next">&#8594;</button>
      </div>
    </section>

    <!-- ── Chords tab ── -->
    <section id="tab-chords" class="tab-panel">
      <div class="chords-controls">
        <div class="control-group">
          <label>Key</label>
          <select id="chord-root">
            <option>C</option><option>C#</option><option>D</option>
            <option>D#</option><option>E</option><option>F</option>
            <option>F#</option><option>G</option><option>G#</option>
            <option>A</option><option>A#</option><option value="B" selected>B</option>
          </select>
        </div>
        <div class="control-group">
          <label>Scale</label>
          <select id="chord-scale">
            <option value="major">Major</option>
            <option value="minor" selected>Minor</option>
            <option value="dorian">Dorian</option>
            <option value="phrygian">Phrygian</option>
            <option value="mixolydian">Mixolydian</option>
          </select>
        </div>
      </div>

      <div class="diatonic-grid" id="diatonic-grid"></div>

      <div class="progression-section">
        <div class="section-header">
          <h3>Progression</h3>
          <button class="btn btn-ghost" id="clear-progression">Clear</button>
          <button class="btn btn-secondary" id="copy-progression">Copy</button>
        </div>
        <div class="progression-row" id="progression-row">
          <span class="progression-empty">Click chords above to build a progression</span>
        </div>
      </div>

      <div class="common-progressions">
        <h3>Common progressions in this key</h3>
        <div id="common-list"></div>
      </div>
    </section>

  </main>

  <script src="js/storage.js"></script>
  <script src="js/fretboard.js"></script>
  <script src="js/chords.js"></script>
  <script src="js/chord-finder.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
